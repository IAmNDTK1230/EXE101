<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidder Phone Demo</title>
  <style>
    :root {
      --bg: #071018;
      --bg2: #0e1624;
      --panel: rgba(255,255,255,.08);
      --panel-2: rgba(255,255,255,.12);
      --line: rgba(255,255,255,.12);
      --text: #f4f7fb;
      --muted: #a9b6ca;
      --cyan: #55d7ff;
      --purple: #8b5cf6;
      --green: #4ade80;
      --danger: #ff6b81;
      --ios-bg: #f4f6fb;
      --ios-text: #161a23;
      --ios-muted: #6d7484;
      --orange: #ff9f0a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: Inter, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(85,215,255,.14), transparent 26%),
        radial-gradient(circle at 85% 85%, rgba(139,92,246,.16), transparent 28%),
        linear-gradient(180deg, #061019, #03070d 70%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 18px;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button, input {
      font: inherit;
      border: 0;
      outline: 0;
    }

    button { cursor: pointer; }

    .phone {
      width: 330px;
      height: 680px;
      border-radius: 48px;
      background: #07080b;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 30px 80px rgba(0,0,0,.5);
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 24px;
      border-radius: 999px;
      background: #090a0e;
      z-index: 10;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 36px;
      overflow: hidden;
      position: relative;
      background: #0e1624;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.07);
    }

    .statusbar {
      position: absolute;
      top: 12px;
      left: 18px;
      right: 18px;
      z-index: 9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      color: inherit;
    }

    .status-icons {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      font-size: 11px;
    }

    .battery {
      width: 22px;
      height: 10px;
      border-radius: 3px;
      border: 1.7px solid currentColor;
      position: relative;
      display: inline-block;
    }
    .battery::before {
      content: "";
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
    }
    .battery::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 13px;
      height: 4px;
      border-radius: 2px;
      background: currentColor;
    }

    .view {
      height: 100%;
      overflow: auto;
      padding: 48px 16px 18px;
      animation: fadeIn .22s ease;
    }
    .view::-webkit-scrollbar { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .home {
      background:
        radial-gradient(circle at 18% 12%, rgba(85,215,255,.34), transparent 22%),
        radial-gradient(circle at 88% 18%, rgba(139,92,246,.38), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(74,222,128,.16), transparent 28%),
        linear-gradient(165deg, #182247 0%, #07111d 58%, #04070d 100%);
      color: white;
      position: relative;
    }

    .home-time {
      text-align: center;
      padding-top: 10px;
      margin-bottom: 26px;
      text-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .home-time h2 {
      font-size: 52px;
      font-weight: 300;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .home-time p {
      font-size: 13px;
      opacity: .82;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px 12px;
      padding: 0 4px;
      margin-bottom: 18px;
    }

    .home-app {
      display: grid;
      justify-items: center;
      gap: 7px;
      background: transparent;
      color: white;
      user-select: none;
      transition: transform .15s ease;
    }
    .home-app:active { transform: scale(.9); }
    .home-app span {
      font-size: 11px;
      text-align: center;
      line-height: 1.15;
    }

    .icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 22px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16), 0 12px 22px rgba(0,0,0,.22);
    }

    .ico-hidder { background: linear-gradient(135deg, #55d7ff, #8b5cf6); color: white; font-weight: 800; }
    .ico-calc { background: linear-gradient(135deg, #2d3341, #0d1119); color: #ff9f0a; }
    .ico-note { background: linear-gradient(135deg, #ffe890, #ffc247); color: #2f2510; }
    .ico-weather { background: linear-gradient(135deg, #59b6ff, #1b79ff); color: white; }
    .ico-calendar { background: linear-gradient(135deg, #ffffff, #dbe4f0); color: #ff3b30; font-weight: 900; }
    .ico-files { background: linear-gradient(135deg, #7ac6ff, #418dff); color: white; }
    .ico-clock { background: linear-gradient(135deg, #f6f7fb, #bcc4d1); color: #111827; }
    .ico-gallery { background: linear-gradient(135deg, #ff77aa, #8b5cf6); color: white; }
    .ico-settings { background: linear-gradient(135deg, #c6cedb, #8c97a9); color: #111827; }
    .ico-music { background: linear-gradient(135deg, #ff5d8f, #ff965d); color: white; }

    .dock {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      padding: 12px;
      border-radius: 24px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .dock .home-app span { display: none; }

    .screen-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 16px 36px rgba(0,0,0,.18);
    }

    .splash {
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 20% 12%, rgba(85,215,255,.18), transparent 24%),
        radial-gradient(circle at 85% 85%, rgba(139,92,246,.22), transparent 28%),
        linear-gradient(180deg, #08121e, #0a1324 60%, #07101a);
    }
    .brand-box {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      box-shadow: 0 18px 40px rgba(85,215,255,.22);
    }
    .splash h1 {
      font-size: 34px;
      letter-spacing: -.8px;
      margin-bottom: 8px;
    }
    .splash p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .top-title {
      margin-bottom: 14px;
    }
    .top-title h3 {
      font-size: 22px;
      margin-bottom: 5px;
      letter-spacing: -.4px;
    }
    .top-title p {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 5px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      margin-bottom: 18px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }
    .tab.active {
      background: rgba(255,255,255,.08);
      color: white;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 15px;
      color: var(--text);
      background: rgba(8,13,22,.92);
      border: 1px solid rgba(255,255,255,.09);
    }
    .input:focus {
      border-color: rgba(85,215,255,.55);
      box-shadow: 0 0 0 3px rgba(85,215,255,.09);
    }

    .btn {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      transition: filter .15s ease, transform .15s ease;
    }
    .btn:active { transform: scale(.98); }
    .btn.secondary {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      color: white;
    }
    .btn.ghost {
      background: transparent;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 9px;
    }

    .message {
      margin-top: 12px;
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 12.5px;
      line-height: 1.45;
      display: none;
    }
    .message.show { display: block; }
    .message.error {
      background: rgba(255,107,129,.12);
      border: 1px solid rgba(255,107,129,.22);
      color: #ffbec7;
    }
    .message.ok {
      background: rgba(74,222,128,.1);
      border: 1px solid rgba(74,222,128,.22);
      color: #b8f4c9;
    }

    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .progress span {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
    }
    .progress span.active {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
    }

    .disguise-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .disguise {
      text-align: left;
      min-height: 120px;
      padding: 14px;
      border-radius: 20px;
      color: white;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
    }
    .disguise.active {
      background: rgba(85,215,255,.08);
      border-color: rgba(85,215,255,.4);
    }
    .disguise .icon {
      width: 42px;
      height: 42px;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .disguise h4 {
      font-size: 14px;
      margin-bottom: 5px;
    }
    .disguise p {
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.45;
    }

    .help-box {
      margin-top: 12px;
      padding: 12px 13px;
      border-radius: 16px;
      background: rgba(85,215,255,.08);
      border: 1px solid rgba(85,215,255,.18);
    }
    .help-box h4 {
      font-size: 13px;
      margin-bottom: 5px;
    }
    .help-box p {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .app-view {
      background: var(--ios-bg);
      color: var(--ios-text);
    }
    .app-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 14px;
      letter-spacing: -.4px;
    }
    .sub-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
    }
    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      background: rgba(85,215,255,.14);
      color: #1171a6;
      white-space: nowrap;
    }

    .sub-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-view {
      position: relative;
      padding-bottom: 88px;
    }

    .app-bottom-nav {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .app-nav-btn {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: rgba(255,255,255,.92);
      color: #1d2430;
      border: 1px solid #d7deea;
      font-size: 22px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
      pointer-events: auto;
    }

    .calc-display {
      height: 120px;
      display: flex;
      align-items: end;
      justify-content: end;
      font-size: 46px;
      font-weight: 300;
      padding: 0 4px 14px;
      text-align: right;
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }
    .calc-btn {
      height: 54px;
      border-radius: 50%;
      background: #e6e7eb;
      color: #111;
      font-size: 18px;
    }
    .calc-btn.dark { background: #33363c; color: white; }
    .calc-btn.op { background: var(--orange); color: white; }
    .calc-btn.zero {
      grid-column: span 2;
      border-radius: 999px;
      text-align: left;
      padding-left: 22px;
    }

    .search {
      width: 100%;
      padding: 12px 13px;
      border-radius: 14px;
      background: #e8e9ee;
      color: var(--ios-text);
      margin-bottom: 14px;
    }

    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .notes-add-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: #007aff;
      color: white;
      font-size: 24px;
      line-height: 1;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 22px rgba(0,122,255,.22);
    }

    .note-editor-title {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ios-text);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.4px;
      margin-bottom: 16px;
    }

    .note-editor-body {
      width: 100%;
      min-height: 330px;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      color: var(--ios-text);
      font: inherit;
      font-size: 15px;
      line-height: 1.6;
    }

    .note-editor-actions {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .note-action-btn {
      padding: 13px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 800;
      background: #007aff;
      color: white;
    }

    .note-action-btn.secondary {
      background: #e8edf4;
      color: #1d2430;
      border: 1px solid #d7deea;
    }

    .note-composer {
      background: white;
      border: 1px solid #e7eaf1;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 8px 18px rgba(20,25,40,.05);
    }

    .note-input {
      width: 100%;
      min-height: 76px;
      resize: none;
      border: 0;
      outline: 0;
      color: var(--ios-text);
      background: transparent;
      font: inherit;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .note-save {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      background: #007aff;
      color: white;
      font-weight: 800;
      font-size: 13px;
    }

    .ios-card {
      padding: 13px;
      border-radius: 16px;
      background: white;
      border: 1px solid #e7eaf1;
      margin-bottom: 10px;
      box-shadow: 0 8px 18px rgba(20,25,40,.05);
    }
    .ios-card h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .ios-card p {
      color: var(--ios-muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .weather-box {
      text-align: center;
      padding: 22px 0 14px;
    }
    .weather-box h2 {
      font-size: 68px;
      font-weight: 300;
      line-height: 1;
    }
    .weather-box p {
      color: var(--ios-muted);
      margin-top: 6px;
      font-size: 13px;
    }

    .vault {
      color: white;
      background:
        radial-gradient(circle at 20% 0%, rgba(85,215,255,.14), transparent 32%),
        radial-gradient(circle at 100% 100%, rgba(139,92,246,.18), transparent 32%),
        linear-gradient(180deg, #0a1018, #070a0f 70%);
    }
    .vault-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .vault-top h2 {
      font-size: 24px;
      letter-spacing: -.4px;
      margin-bottom: 4px;
    }
    .vault-top p {
      color: #8f9bb0;
      font-size: 12px;
    }
    .mini-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: white;
      border: 1px solid rgba(255,255,255,.08);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
    }
    .stat strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }
    .stat span {
      color: #97a3b9;
      font-size: 12px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .photo {
      aspect-ratio: 1;
      border-radius: 16px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.24), transparent 24%),
        linear-gradient(135deg, rgba(85,215,255,.28), rgba(139,92,246,.28)),
        #253246;
    }

    .bottom-note {
      color: #8f9bb0;
      font-size: 12px;
      line-height: 1.5;
    }


    .vault-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .upload-zone {
      margin: 12px 0 14px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.07);
      border: 1px dashed rgba(255,255,255,.18);
    }

    .upload-zone p {
      display: none;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: white;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }

    .photo.uploaded {
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255,255,255,.12);
    }

    .plan-grid {
      display: grid;
      gap: 10px;
      margin: 12px 0 14px;
    }

    .plan-card {
      width: 100%;
      text-align: left;
      padding: 14px;
      border-radius: 18px;
      color: white;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .plan-card.active {
      border-color: rgba(85,215,255,.55);
      background: rgba(85,215,255,.1);
    }

    .plan-card h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .plan-card p {
      font-size: 12px;
      line-height: 1.4;
      color: #97a3b9;
    }

    .plan-price {
      font-weight: 900;
      font-size: 15px;
      color: #bff3ff;
      white-space: nowrap;
    }

    .setting-tabs {
      display: flex;
      gap: 6px;
      padding: 5px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      margin-bottom: 14px;
    }

    .setting-tab {
      flex: 1;
      padding: 10px 8px;
      border-radius: 12px;
      background: transparent;
      color: #97a3b9;
      font-size: 12px;
      font-weight: 800;
    }

    .setting-tab.active {
      background: rgba(85,215,255,.12);
      color: white;
    }

    .settings-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .setting-row {
      padding: 13px;
      border-radius: 17px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.09);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .setting-row h4 {
      font-size: 13px;
      margin-bottom: 3px;
    }

    .setting-row p {
      font-size: 12px;
      color: #97a3b9;
      line-height: 1.35;
    }

    .small-btn {
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      color: white;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,.1);
      white-space: nowrap;
    }

    .home-bar {
      position: absolute;
      bottom: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 118px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      opacity: .62;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 30;
      padding: 11px 14px;
      border-radius: 999px;
      background: rgba(6,10,18,.94);
      color: white;
      font-size: 12.5px;
      box-shadow: 0 12px 30px rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.1);
      display: none;
      white-space: nowrap;
      max-width: 85%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="phone">
    <div id="phoneScreen" class="phone-screen"></div>
    <div id="toast" class="toast"></div>
  </div>

  <script>
    const DEMO_USER = {
      name: "Demo User",
      email: "demo@hidder.app",
      password: "123456",
      setupDone: true,
      disguise: "Calculator",
      displayName: "Quick Calc",
      secretCode: "1234=",
      decoyCode: "0000=",
      decoyContent: "Ảnh phong cảnh và tài liệu học tập",
      plan: "Trial",
      storage: "Trial",
      uploadedImages: [],
      fakeNotes: [
        { title: "Shopping list", body: "Milk, eggs, bread, coffee..." },
        { title: "Class reminder", body: "Submit project report before Friday." },
        { title: "Meeting notes", body: "Discuss UI flow and user privacy." }
      ]
    };

    const STORAGE_KEY = "hidderUsersPhoneOnly";
    const SESSION_KEY = "hidderSessionPhoneOnly";

    let currentUser = null;
    let authMode = "register";
    let setupStep = 1;
    let selectedDisguise = "";
    let calcInput = "";
    let holdTimer = null;

    init();

    function init() {
      if (!localStorage.getItem(STORAGE_KEY)) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify([DEMO_USER]));
      }
      const session = localStorage.getItem(SESSION_KEY);
      if (session) {
        currentUser = JSON.parse(session);
        migrateCurrentUser();
      }
      renderHomeScreen();
    }

    function users() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function saveUsers(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function saveSession(user) {
      currentUser = user;
      localStorage.setItem(SESSION_KEY, JSON.stringify(user));
    }

    function updateUser(user) {
      const data = users();
      const index = data.findIndex(u => u.email === user.email);
      if (index >= 0) data[index] = user;
      else data.push(user);
      saveUsers(data);
      saveSession(user);
    }

    function timeNow() {
      return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    function dateNow() {
      return new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: '2-digit', month: 'long' });
    }

    function statusBar(color = 'white') {
      return `
        <div class="statusbar" style="color:${color}">
          <span>${timeNow()}</span>
          <span class="status-icons">5G <span>▰▰▰</span><span class="battery"></span></span>
        </div>
      `;
    }

    function iconMap(name) {
      const map = {
        Hidder: ['H', 'ico-hidder'],
        Calculator: ['＋', 'ico-calc'],
        Notes: ['☰', 'ico-note'],
        Weather: ['☁', 'ico-weather'],
        Calendar: ['31', 'ico-calendar'],
        Files: ['▤', 'ico-files'],
        Clock: ['◷', 'ico-clock'],
        Gallery: ['◧', 'ico-gallery'],
        Settings: ['⚙', 'ico-settings'],
        Music: ['♪', 'ico-music']
      };
      return map[name] || map.Hidder;
    }

    function homeIcon(appName, label, onClick, showLabel = true) {
      const [symbol, cls] = iconMap(appName);
      return `
        <button class="home-app" onclick="${onClick}">
          <div class="icon ${cls}">${symbol}</div>
          ${showLabel ? `<span>${label}</span>` : ''}
        </button>
      `;
    }

    function renderPhone(html, theme = 'dark') {
      document.getElementById('phoneScreen').innerHTML = `
        ${statusBar(theme === 'light' ? '#161a23' : 'white')}
        ${html}
      `;
    }

    function renderHomeScreen() {
      const hasSetup = currentUser && currentUser.setupDone;
      const mainLabel = hasSetup ? (currentUser.displayName || currentUser.disguise) : 'Hidder';
      const mainApp = hasSetup ? currentUser.disguise : 'Hidder';
      const mainAction = hasSetup ? 'openDisguisedApp()' : 'openEntryFlow()';

      renderPhone(`
        <div class="view home">
          <div class="home-time">
            <h2>${timeNow()}</h2>
            <p>${dateNow()}</p>
          </div>

          <div class="app-grid">
            ${homeIcon(mainApp, mainLabel, mainAction)}
            ${homeIcon('Notes', 'Notes', `toast('Đây là app bình thường')`)}
            ${homeIcon('Weather', 'Weather', `toast('Đây là app bình thường')`)}
            ${homeIcon('Calendar', 'Calendar', `toast('Đây là app bình thường')`)}
            ${homeIcon('Clock', 'Clock', `toast('Đây là app bình thường')`)}
            ${homeIcon('Gallery', 'Gallery', `toast('Đây là app bình thường')`)}
            ${homeIcon('Files', 'Files', `toast('Đây là app bình thường')`)}
            ${homeIcon('Music', 'Music', `toast('Đây là app bình thường')`)}
          </div>

          <div class="dock">
            ${homeIcon('Calculator', 'Calculator', `toast('Đây là app bình thường')`, false)}
            ${homeIcon('Notes', 'Notes', `toast('Đây là app bình thường')`, false)}
            ${homeIcon('Weather', 'Weather', `toast('Đây là app bình thường')`, false)}
            ${homeIcon('Files', 'Files', `toast('Đây là app bình thường')`, false)}
          </div>

          <div class="home-bar"></div>
        </div>
      `, 'dark');
    }

    function openEntryFlow() {
      if (currentUser && currentUser.setupDone) {
        openDisguisedApp();
        return;
      }
      if (currentUser && !currentUser.setupDone) {
        setupStep = 1;
        selectedDisguise = currentUser.disguise || '';
        renderSetup();
        return;
      }
      authMode = 'register';
      renderAuth();
    }

    function renderAuth() {
      renderPhone(`
        <div class="view splash">
          <div class="screen-card">
            <div class="brand-box">H</div>
            <div class="top-title">
              <h3>Hidder</h3>
              <p>Đăng ký lần đầu để thiết lập lớp vỏ ngụy trang và không gian ẩn.</p>
            </div>

            <div class="tabs">
              <button class="tab ${authMode === 'register' ? 'active' : ''}" onclick="switchAuth('register')">Đăng ký</button>
              <button class="tab ${authMode === 'login' ? 'active' : ''}" onclick="switchAuth('login')">Đăng nhập</button>
            </div>

            ${authMode === 'register' ? `
              <div class="field">
                <label>Tên</label>
                <input id="registerName" class="input" type="text" placeholder="Nguyễn Văn A" />
              </div>
              <div class="field">
                <label>Email</label>
                <input id="registerEmail" class="input" type="email" placeholder="you@example.com" />
              </div>
              <div class="field">
                <label>Mật khẩu</label>
                <input id="registerPassword" class="input" type="password" placeholder="Tối thiểu 6 ký tự" />
              </div>
              <button class="btn" onclick="registerUser()">Tạo tài khoản</button>
            ` : `
              <div class="field">
                <label>Email</label>
                <input id="loginEmail" class="input" type="email" placeholder="you@example.com" />
              </div>
              <div class="field">
                <label>Mật khẩu</label>
                <input id="loginPassword" class="input" type="password" placeholder="Nhập mật khẩu" />
              </div>
              <button class="btn" onclick="loginUser()">Đăng nhập</button>
              
            `}

            <button class="btn ghost" style="margin-top:10px;" onclick="renderHomeScreen()">Quay lại màn hình chính</button>
            <div id="authMessage" class="message"></div>
          </div>
          <div class="home-bar"></div>
        </div>
      `, 'dark');
    }

    function switchAuth(mode) {
      authMode = mode;
      renderAuth();
    }

    function renderSetup() {
      const aliasValue = currentUser?.displayName || '';
      const secretValue = currentUser?.secretCode || '';
      const decoyValue = currentUser?.decoyCode || '';
      const decoyContentValue = currentUser?.decoyContent || '';

      renderPhone(`
        <div class="view splash">
          <div class="screen-card">
            <div class="top-title">
              <h3>Thiết lập lần đầu</h3>
              <p>Sau khi hoàn tất, màn hình chính sẽ hiện app ngụy trang đã được tùy chỉnh.</p>
            </div>

            <div class="progress">
              <span class="${setupStep >= 1 ? 'active' : ''}"></span>
              <span class="${setupStep >= 2 ? 'active' : ''}"></span>
            </div>

            ${setupStep === 1 ? `
              <div class="disguise-grid">
                ${setupOption('Calculator', 'Máy tính', 'Nhập mã rồi bấm dấu = để mở Vault.')}
                ${setupOption('Notes', 'Ghi chú', 'Gõ mã vào ô tìm kiếm rồi nhấn Enter.')}
                ${setupOption('Calendar', 'Lịch', 'Gõ mã vào ô tìm kiếm lịch rồi nhấn Enter.')}
                ${setupOption('Weather', 'Thời tiết', 'Nhấn giữ phần nhiệt độ 2 giây để mở.')}
              </div>

              <div class="field">
                <label>Tên app hiển thị ngoài màn hình chính</label>
                <input id="displayName" class="input" type="text" placeholder="Quick Calc / Daily Notes" value="${escapeHtml(aliasValue)}" />
              </div>

              <div class="help-box">
                <h4>Gợi ý</h4>
                <p>Đặt tên giống app thường để lớp vỏ tự nhiên hơn, ví dụ: Quick Calc, Daily Notes hoặc Weather+.</p>
              </div>

              <button class="btn" style="margin-top:14px;" onclick="nextSetup()">Tiếp tục</button>
            ` : `
              <div class="field">
                <label>Mật khẩu thật</label>
                <input id="secretCode" class="input" type="text" placeholder="1234=" value="${escapeHtml(secretValue)}" />
              </div>
              <div class="field">
                <label>Mật khẩu giả</label>
                <input id="decoyCode" class="input" type="text" placeholder="0000=" value="${escapeHtml(decoyValue)}" />
              </div>
              <div class="field">
                <label>Nội dung cho Vault giả</label>
                <input id="decoyContent" class="input" type="text" placeholder="Ảnh phong cảnh, tài liệu học tập" value="${escapeHtml(decoyContentValue)}" />
              </div>

              <div class="help-box">
                <h4>Hướng dẫn mở Vault</h4>
                <p id="setupGuideText">${setupGuideText(selectedDisguise || currentUser?.disguise || 'Calculator')}</p>
              </div>

              <div style="display:flex; gap:10px; margin-top:14px;">
                <button class="btn secondary" onclick="prevSetup()">Quay lại</button>
                <button class="btn" onclick="finishSetup()">Hoàn tất</button>
              </div>
            `}

            <div id="setupMessage" class="message"></div>
          </div>
          <div class="home-bar"></div>
        </div>
      `, 'dark');
    }

    function setupOption(value, title, desc) {
      const [symbol, cls] = iconMap(value);
      return `
        <button class="disguise ${selectedDisguise === value ? 'active' : ''}" onclick="chooseDisguise('${value}')">
          <div class="icon ${cls}">${symbol}</div>
          <h4>${title}</h4>
          <p>${desc}</p>
        </button>
      `;
    }

    function chooseDisguise(name) {
      selectedDisguise = name;
      const defaults = {
        Calculator: 'Quick Calc',
        Notes: 'Daily Notes',
        Calendar: 'My Calendar',
        Weather: 'Weather+'
      };
      if (setupStep === 1) {
        const currentLabel = document.getElementById('displayName');
        if (currentLabel && !currentLabel.value.trim()) currentLabel.value = defaults[name] || name;
      }
      renderSetup();
    }

    function nextSetup() {
      const label = document.getElementById('displayName')?.value.trim();
      if (!selectedDisguise) return showMessage('setupMessage', 'Vui lòng chọn một app ngụy trang.');
      if (!label) return showMessage('setupMessage', 'Vui lòng nhập tên app hiển thị.');
      if (!currentUser) return showMessage('setupMessage', 'Vui lòng tạo tài khoản hoặc đăng nhập trước.');
      currentUser.disguise = selectedDisguise;
      currentUser.displayName = label;
      saveSession(currentUser);
      setupStep = 2;
      renderSetup();
    }

    function prevSetup() {
      setupStep = 1;
      renderSetup();
    }

    function finishSetup() {
      const secretCode = document.getElementById('secretCode').value.trim();
      const decoyCode = document.getElementById('decoyCode').value.trim();
      const decoyContent = document.getElementById('decoyContent').value.trim();

      if (!secretCode || secretCode.length < 4) return showMessage('setupMessage', 'Mật khẩu thật cần tối thiểu 4 ký tự.');
      if (!decoyCode || decoyCode.length < 4) return showMessage('setupMessage', 'Vui lòng nhập mật khẩu giả.');
      if (normalizeCode(secretCode) === normalizeCode(decoyCode)) return showMessage('setupMessage', 'Mật khẩu giả không được trùng mật khẩu thật.');

      currentUser.secretCode = normalizeCodeForDisguise(secretCode, currentUser.disguise || selectedDisguise);
      currentUser.decoyCode = normalizeCodeForDisguise(decoyCode, currentUser.disguise || selectedDisguise);
      currentUser.decoyContent = decoyContent || 'Ảnh phong cảnh, tài liệu học tập';
      currentUser.setupDone = true;
      updateUser(currentUser);
      toast('Thiết lập hoàn tất');
      renderHomeScreen();
    }

    function registerUser() {
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value.trim();
      if (!name || !email || !password) return showMessage('authMessage', 'Vui lòng nhập đầy đủ thông tin.');
      if (password.length < 6) return showMessage('authMessage', 'Mật khẩu tối thiểu 6 ký tự.');
      if (users().some(u => u.email === email)) return showMessage('authMessage', 'Email này đã tồn tại.');

      const user = {
        name,
        email,
        password,
        setupDone: false,
        disguise: '',
        displayName: '',
        secretCode: '',
        decoyCode: '',
        decoyContent: '',
        plan: 'Trial',
        storage: 'Trial',
        uploadedImages: [],
        fakeNotes: [
          { title: "Shopping list", body: "Milk, eggs, bread, coffee..." },
          { title: "Class reminder", body: "Submit project report before Friday." }
        ]
      };
      const data = users();
      data.push(user);
      saveUsers(data);
      saveSession(user);
      selectedDisguise = '';
      setupStep = 1;
      renderSetup();
    }

    function loginUser() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!email || !password) return showMessage('authMessage', 'Vui lòng nhập email và mật khẩu.');
      const found = users().find(u => u.email === email && u.password === password);
      if (!found) return showMessage('authMessage', 'Sai email hoặc mật khẩu.');
      saveSession(found);
      selectedDisguise = found.disguise || '';
      if (found.setupDone) renderHomeScreen();
      else {
        setupStep = 1;
        renderSetup();
      }
    }

    function openDisguisedApp() {
      if (!currentUser || !currentUser.setupDone) return openEntryFlow();
      const app = currentUser.disguise;
      if (app === 'Calculator') return renderCalculator();
      if (app === 'Notes') return renderNotes();
      if (app === 'Calendar') return renderCalendar();
      if (app === 'Files') return renderFiles();
      if (app === 'Weather') return renderWeather();
      renderCalculator();
    }

    function topBarInApp(title, tag = 'App thường') {
      return `
        <div class="sub-tools">
          <div class="app-title">${title}</div>
          <div class="sub-actions">
            <span class="pill">${tag}</span>
          </div>
        </div>
      `;
    }

    function bottomHomeButton() {
      return `
        <div class="app-bottom-nav">
          <button class="app-nav-btn" onclick="renderHomeScreen()">⌂</button>
        </div>
      `;
    }

    function renderCalculator() {
      calcInput = '';
      const title = currentUser.displayName || 'Calculator';
      renderPhone(`
        <div class="view app-view">
          ${topBarInApp(title, 'Calculator')}
          <div id="calcDisplay" class="calc-display">0</div>
          <div class="calc-grid">
            <button class="calc-btn" onclick="calcPress('AC')">AC</button>
            <button class="calc-btn" onclick="calcPress('+/-')">+/-</button>
            <button class="calc-btn" onclick="calcPress('%')">%</button>
            <button class="calc-btn op" onclick="calcPress('÷')">÷</button>
            <button class="calc-btn dark" onclick="calcPress('7')">7</button>
            <button class="calc-btn dark" onclick="calcPress('8')">8</button>
            <button class="calc-btn dark" onclick="calcPress('9')">9</button>
            <button class="calc-btn op" onclick="calcPress('×')">×</button>
            <button class="calc-btn dark" onclick="calcPress('4')">4</button>
            <button class="calc-btn dark" onclick="calcPress('5')">5</button>
            <button class="calc-btn dark" onclick="calcPress('6')">6</button>
            <button class="calc-btn op" onclick="calcPress('-')">-</button>
            <button class="calc-btn dark" onclick="calcPress('1')">1</button>
            <button class="calc-btn dark" onclick="calcPress('2')">2</button>
            <button class="calc-btn dark" onclick="calcPress('3')">3</button>
            <button class="calc-btn op" onclick="calcPress('+')">+</button>
            <button class="calc-btn dark zero" onclick="calcPress('0')">0</button>
            <button class="calc-btn dark" onclick="calcPress('.')">.</button>
            <button class="calc-btn op" onclick="calcPress('=')">=</button>
          </div>
          ${bottomHomeButton()}
        </div>
      `, 'light');
    }

    function calcPress(v) {
      const display = document.getElementById('calcDisplay');
      if (!display) return;
      if (v === 'AC') {
        calcInput = '';
        display.textContent = '0';
        return;
      }
      if (v === '+/-' || v === '%') return;
      if (v === '=') {
        calcInput += '=';
        const rawInput = calcInput.replace(/=$/, '');
        const secretRaw = normalizeCode(currentUser.secretCode || '');
        const decoyRaw = normalizeCode(currentUser.decoyCode || '');
        if (calcInput === currentUser.secretCode || rawInput === secretRaw) return unlockVault(false);
        if (calcInput === currentUser.decoyCode || rawInput === decoyRaw) return unlockVault(true);
        try {
          const exp = calcInput.replace('=', '').replaceAll('×', '*').replaceAll('÷', '/');
          const result = Function('"use strict"; return (' + exp + ')')();
          if (Number.isFinite(result)) {
            const shown = String(result).slice(0, 10);
            display.textContent = shown;
            calcInput = shown;
          } else {
            display.textContent = 'Error';
            calcInput = '';
          }
        } catch {
          display.textContent = 'Error';
          calcInput = '';
        }
        return;
      }
      calcInput += v;
      display.textContent = calcInput.slice(-10);
    }

    function renderNotes() {
      const title = currentUser.displayName || 'Notes';
      const notes = currentUser.fakeNotes || [];
      const noteCards = notes.map((note, index) => `
        <button class="ios-card" style="width:100%;text-align:left;" onclick="openFakeNoteEditor(${index})">
          <h4>${escapeHtml(note.title || 'Untitled')}</h4>
          <p>${escapeHtml((note.body || '').slice(0, 90))}${(note.body || '').length > 90 ? '...' : ''}</p>
        </button>
      `).join('');

      renderPhone(`
        <div class="view app-view">
          ${topBarInApp(title, 'Notes')}

          <div class="notes-header">
            <input class="search" style="margin-bottom:0;" placeholder="Search notes" onkeydown="searchUnlock(event)" />
            <button class="notes-add-btn" onclick="openFakeNoteEditor()">+</button>
          </div>

          ${noteCards || `<div class="ios-card"><h4>Chưa có ghi chú</h4><p>Nhấn dấu + để tạo ghi chú mới.</p></div>`}
          ${bottomHomeButton()}
        </div>
      `, 'light');
    }

    function openFakeNoteEditor(index = null) {
      const isEdit = index !== null && index !== undefined;
      const note = isEdit ? (currentUser.fakeNotes || [])[index] : { title: '', body: '' };
      renderPhone(`
        <div class="view app-view">
          <div class="sub-tools">
            <button class="app-nav-btn" style="width:42px;height:42px;font-size:18px;" onclick="renderNotes()">‹</button>
            <span class="pill">${isEdit ? 'Edit Note' : 'New Note'}</span>
          </div>

          <input id="noteTitleInput" class="note-editor-title" placeholder="Tiêu đề" value="${escapeHtml(note?.title || '')}" />
          <textarea id="noteBodyInput" class="note-editor-body" placeholder="Nhập nội dung ghi chú...">${escapeHtml(note?.body || '')}</textarea>

          <div class="note-editor-actions">
            <button class="note-action-btn secondary" onclick="renderNotes()">Hủy</button>
            <button class="note-action-btn" onclick="saveFakeNote(${isEdit ? index : 'null'})">Lưu</button>
          </div>
        </div>
      `, 'light');
    }

    function saveFakeNote(index = null) {
      const titleInput = document.getElementById('noteTitleInput');
      const bodyInput = document.getElementById('noteBodyInput');
      const title = titleInput ? titleInput.value.trim() : '';
      const body = bodyInput ? bodyInput.value.trim() : '';

      if (!title && !body) return toast('Vui lòng nhập tiêu đề hoặc nội dung');

      currentUser.fakeNotes = currentUser.fakeNotes || [];
      const savedNote = {
        title: title || 'Untitled',
        body: body || ''
      };

      if (index !== null && index !== undefined && currentUser.fakeNotes[index]) {
        currentUser.fakeNotes[index] = savedNote;
      } else {
        currentUser.fakeNotes.unshift(savedNote);
      }

      updateUser(currentUser);
      toast('Đã lưu ghi chú');
      renderNotes();
    }


    function renderCalendar() {
      const title = currentUser.displayName || 'Calendar';
      renderPhone(`
        <div class="view app-view">
          ${topBarInApp(title, 'Calendar')}
          <input class="search" placeholder="Search calendar" onkeydown="searchUnlock(event)" />
          <div class="ios-card"><h4>Today</h4><p>Team meeting · 9:00 AM</p></div>
          <div class="ios-card"><h4>Tomorrow</h4><p>Project deadline · 11:59 PM</p></div>
          <div class="ios-card"><h4>Friday</h4><p>Study session · 7:30 PM</p></div>
          ${bottomHomeButton()}
        </div>
      `, 'light');
    }

    function renderFiles() {
      const title = currentUser.displayName || 'Files';
      renderPhone(`
        <div class="view app-view">
          ${topBarInApp(title, 'Files')}
          <input class="search" placeholder="Search files" onkeydown="searchUnlock(event)" />
          <div class="ios-card"><h4>Downloads</h4><p>12 items</p></div>
          <div class="ios-card"><h4>Documents</h4><p>8 items</p></div>
          <div class="ios-card"><h4>School</h4><p>5 items</p></div>
          <div class="ios-card"><h4>Work</h4><p>9 items</p></div>
          ${bottomHomeButton()}
        </div>
      `, 'light');
    }

    function renderWeather() {
      const title = currentUser.displayName || 'Weather';
      renderPhone(`
        <div class="view app-view">
          ${topBarInApp(title, 'Weather')}
          <div class="weather-box" onmousedown="startHold()" onmouseup="stopHold()" ontouchstart="startHold()" ontouchend="stopHold()">
            <h2>29°</h2>
            <p>Ho Chi Minh City · Cloudy</p>
          </div>
          <div class="ios-card"><h4>Today</h4><p>29° / 25° · Light wind</p></div>
          <div class="ios-card"><h4>Hourly Forecast</h4><p>10AM 29° · 11AM 30° · 12PM 31°</p></div>
          ${bottomHomeButton()}
        </div>
      `, 'light');
    }

    function searchUnlock(event) {
      if (event.key !== 'Enter') return;
      const value = event.target.value.trim();
      if (value === currentUser.secretCode) return unlockVault(false);
      if (value === currentUser.decoyCode) return unlockVault(true);
      toast('Không tìm thấy kết quả');
    }

    function startHold() {
      clearTimeout(holdTimer);
      holdTimer = setTimeout(() => unlockVault(false), 2000);
    }

    function stopHold() {
      clearTimeout(holdTimer);
    }

    function unlockVault(isDecoy) {
      renderVault(isDecoy);
      toast(isDecoy ? 'Đã mở Vault giả' : 'Đã mở Hidden Vault');
    }

    function renderVault(isDecoy) {
      const uploaded = !isDecoy ? (currentUser.uploadedImages || []) : [];
      const defaultPhotos = Array.from({ length: isDecoy ? 6 : Math.max(0, 6 - uploaded.length) }, () => `<div class="photo"></div>`).join('');
      const uploadedPhotos = uploaded.slice(0, 9).map(src => `<div class="photo uploaded" style="background-image:url('${src}')"></div>`).join('');
      renderPhone(`
        <div class="view vault">
          <div class="vault-top">
            <div>
              <h2>${isDecoy ? 'Vault giả' : 'Hidden Vault'}</h2>
              <p>${isDecoy ? 'Dữ liệu vô hại để ngụy trang' : `${escapeHtml(currentUser.storage || 'Trial')} · ${escapeHtml(currentUser.plan || 'Trial')}`}</p>
            </div>
            <div class="vault-actions">
              ${!isDecoy ? `<button class="mini-btn" onclick="renderPayment()">＋</button><button class="mini-btn" onclick="renderAppSettings()">⚙</button>` : ''}
              <button class="mini-btn" onclick="renderHomeScreen()">⌂</button>
            </div>
          </div>

          <div class="stats">
            <div class="stat"><strong>${isDecoy ? '32' : String(248 + uploaded.length)}</strong><span>Photos</span></div>
            <div class="stat"><strong>${isDecoy ? '8' : '37'}</strong><span>Files</span></div>
            <div class="stat"><strong>${isDecoy ? '5' : '18'}</strong><span>Notes</span></div>
            <div class="stat"><strong>${isDecoy ? '0' : '12'}</strong><span>Accounts</span></div>
          </div>

          ${!isDecoy ? `
            <div class="upload-zone">
              <label class="upload-btn">
                Upload ảnh vào Vault
                <input type="file" accept="image/*" multiple style="display:none" onchange="handleImageUpload(this)" />
              </label>
              
            </div>
          ` : ''}

          <div class="photo-grid">
            ${isDecoy ? defaultPhotos : uploadedPhotos + defaultPhotos}
          </div>

          <div class="help-box">
            <h4>${isDecoy ? 'Nội dung hiển thị' : 'Bảo mật'}</h4>
            <p>${isDecoy ? escapeHtml(currentUser.decoyContent || 'Ảnh phong cảnh, tài liệu học tập') : 'Có thể upload ảnh, đổi giao diện app trong Settings hoặc mua thêm dung lượng.'}</p>
          </div>

          <p class="bottom-note" style="margin-top:12px;">Nhấn nút Home để thoát ra màn hình chính và chỉ còn nhìn thấy app bình thường.</p>
        </div>
      `, 'dark');
    }


    function migrateCurrentUser() {
      if (!currentUser) return;
      if (currentUser.disguise && currentUser.secretCode && currentUser.decoyCode) {
        currentUser.setupDone = true;
      }
      if (currentUser.setupDone && !currentUser.displayName) {
        const defaults = { Calculator: 'Quick Calc', Notes: 'Daily Notes', Calendar: 'My Calendar', Weather: 'Weather+' };
        currentUser.displayName = defaults[currentUser.disguise] || currentUser.disguise || 'Quick Calc';
      }
      if (!currentUser.plan) currentUser.plan = 'Trial';
      if (!currentUser.storage) currentUser.storage = 'Trial';
      if (!Array.isArray(currentUser.uploadedImages)) currentUser.uploadedImages = [];
      if (!Array.isArray(currentUser.fakeNotes)) {
        currentUser.fakeNotes = [
          { title: "Shopping list", body: "Milk, eggs, bread, coffee..." },
          { title: "Class reminder", body: "Submit project report before Friday." },
          { title: "Meeting notes", body: "Discuss UI flow and user privacy." }
        ];
      }
      saveSession(currentUser);
    }

    function renderAppSettings() {
      if (!currentUser) return openEntryFlow();
      renderPhone(`
        <div class="view vault">
          <div class="vault-top">
            <div>
              <h2>Settings</h2>
              <p>Đổi giao diện app, mật khẩu và gói dung lượng.</p>
            </div>
            <button class="mini-btn" onclick="renderHomeScreen()">⌂</button>
          </div>

          <div class="settings-list">
            <div class="setting-row">
              <div>
                <h4>Giao diện app</h4>
                <p>${escapeHtml(currentUser.displayName || currentUser.disguise || 'Chưa thiết lập')} · ${escapeHtml(currentUser.disguise || '')}</p>
              </div>
              <button class="small-btn" onclick="renderChangeDisguise()">Đổi</button>
            </div>

            <div class="setting-row">
              <div>
                <h4>Mật khẩu</h4>
                <p>Đổi mật khẩu thật và mật khẩu giả.</p>
              </div>
              <button class="small-btn" onclick="renderChangePassword()">Đổi</button>
            </div>

            <div class="setting-row">
              <div>
                <h4>Dung lượng</h4>
                <p>${escapeHtml(currentUser.storage || 'Trial')} · ${escapeHtml(currentUser.plan || 'Trial')}</p>
              </div>
              <button class="small-btn" onclick="renderPayment()">Mua thêm</button>
            </div>

            <div class="setting-row">
              <div>
                <h4>Tài khoản</h4>
                <p>${escapeHtml(currentUser.email || '')}</p>
              </div>
              <button class="small-btn" onclick="logoutUser()">Logout</button>
            </div>
          </div>

          <button class="btn" style="margin-top:14px;" onclick="renderVault(false)">Vào Hidden Vault</button>
          <div class="home-bar"></div>
        </div>
      `, 'dark');
    }

    function renderChangeDisguise() {
      const selected = currentUser.disguise || 'Calculator';
      renderPhone(`
        <div class="view vault">
          <div class="vault-top">
            <div>
              <h2>Đổi giao diện</h2>
              <p>Chọn lớp vỏ mới và kiểm tra lại mật khẩu phù hợp với app đó.</p>
            </div>
            <button class="mini-btn" onclick="renderAppSettings()">‹</button>
          </div>

          <div class="setting-tabs">
            <button class="setting-tab active">Giao diện</button>
            <button class="setting-tab active">Mật khẩu</button>
          </div>

          <div class="disguise-grid">
            ${changeDisguiseOption('Calculator', 'Máy tính', selected)}
            ${changeDisguiseOption('Notes', 'Ghi chú', selected)}
            ${changeDisguiseOption('Calendar', 'Lịch', selected)}
            ${changeDisguiseOption('Weather', 'Thời tiết', selected)}
          </div>

          <div class="field">
            <label>Tên app hiển thị ngoài màn hình chính</label>
            <input id="newDisplayName" class="input" value="${escapeHtml(currentUser.displayName || '')}" placeholder="Quick Calc / Daily Notes" />
          </div>

          <div class="help-box">
            <h4>Cách mở Vault theo giao diện</h4>
            <p id="changeGuideText">${setupGuideText(selected)}</p>
          </div>

          <div class="help-box" style="margin-top:10px;">
            <h4>Thông báo chuẩn hóa mật khẩu</h4>
            <p id="changeFormatText">${disguiseFormatNotice(selected)}</p>
          </div>

          <div class="field" style="margin-top:12px;">
            <label>Mật khẩu thật</label>
            <input id="changeSecretCode" class="input" value="${escapeHtml(suggestCodeForDisguise(currentUser.secretCode || '', selected))}" placeholder="Ví dụ: 1234=" />
          </div>

          <div class="field">
            <label>Mật khẩu giả</label>
            <input id="changeDecoyCode" class="input" value="${escapeHtml(suggestCodeForDisguise(currentUser.decoyCode || '', selected))}" placeholder="Ví dụ: 0000=" />
          </div>

          <div class="field">
            <label>Nội dung Vault giả</label>
            <input id="changeDecoyContent" class="input" value="${escapeHtml(currentUser.decoyContent || '')}" placeholder="Ảnh phong cảnh, tài liệu học tập" />
          </div>

          <input id="newDisguiseValue" type="hidden" value="${escapeHtml(selected)}" />
          <button class="btn" onclick="saveNewDisguise()">Lưu giao diện & mật khẩu</button>
          <div class="home-bar"></div>
        </div>
      `, 'dark');
    }

    function changeDisguiseOption(value, title, selected) {
      const [symbol, cls] = iconMap(value);
      return `
        <button class="disguise ${selected === value ? 'active' : ''}" onclick="selectNewDisguise('${value}')">
          <div class="icon ${cls}">${symbol}</div>
          <h4>${title}</h4>
          <p>${setupGuideText(value)}</p>
        </button>
      `;
    }

    function selectNewDisguise(value) {
      const hidden = document.getElementById('newDisguiseValue');
      const previous = hidden ? hidden.value : currentUser.disguise;
      if (hidden) hidden.value = value;

      const defaults = { Calculator: 'Quick Calc', Notes: 'Daily Notes', Calendar: 'My Calendar', Weather: 'Weather+' };
      const input = document.getElementById('newDisplayName');
      if (input) input.value = defaults[value] || value;

      const guide = document.getElementById('changeGuideText');
      if (guide) guide.textContent = setupGuideText(value);

      const formatText = document.getElementById('changeFormatText');
      if (formatText) formatText.textContent = disguiseFormatNotice(value);

      const secretInput = document.getElementById('changeSecretCode');
      const decoyInput = document.getElementById('changeDecoyCode');
      if (secretInput) secretInput.value = suggestCodeForDisguise(secretInput.value || currentUser.secretCode || '', value);
      if (decoyInput) decoyInput.value = suggestCodeForDisguise(decoyInput.value || currentUser.decoyCode || '', value);

      document.querySelectorAll('.disguise').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    function saveNewDisguise() {
      const value = document.getElementById('newDisguiseValue')?.value || currentUser.disguise || 'Calculator';
      const label = document.getElementById('newDisplayName')?.value.trim();
      const secret = document.getElementById('changeSecretCode')?.value.trim();
      const decoy = document.getElementById('changeDecoyCode')?.value.trim();
      const content = document.getElementById('changeDecoyContent')?.value.trim();

      if (!label) return toast('Vui lòng nhập tên app hiển thị');
      if (!secret || secret.length < 4) return toast('Mật khẩu thật cần tối thiểu 4 ký tự');
      if (!decoy || decoy.length < 4) return toast('Mật khẩu giả cần tối thiểu 4 ký tự');
      if (normalizeCode(secret) === normalizeCode(decoy)) return toast('Mật khẩu giả không được trùng mật khẩu thật');

      currentUser.disguise = value;
      currentUser.displayName = label;
      currentUser.secretCode = normalizeCodeForDisguise(secret, value);
      currentUser.decoyCode = normalizeCodeForDisguise(decoy, value);
      currentUser.decoyContent = content || currentUser.decoyContent || 'Ảnh phong cảnh, tài liệu học tập';
      currentUser.setupDone = true;
      updateUser(currentUser);
      renderAppSettings();
      if (value === 'Calculator') {
        toast('Đã đổi sang Calculator. Mật khẩu sẽ tự có dấu = ở cuối.');
      } else {
        toast('Đã đổi sang ' + value + '. Mật khẩu sẽ tự bỏ dấu = ở cuối.');
      }
    }

    function renderChangePassword() {
      renderPhone(`
        <div class="view vault">
          <div class="vault-top">
            <div>
              <h2>Đổi mật khẩu</h2>
              <p>Cập nhật mật khẩu thật và mật khẩu giả.</p>
            </div>
            <button class="mini-btn" onclick="renderAppSettings()">‹</button>
          </div>

          <div class="field">
            <label>Mật khẩu thật</label>
            <input id="newSecretCode" class="input" value="${escapeHtml(currentUser.secretCode || '')}" placeholder="1234=" />
          </div>

          <div class="field">
            <label>Mật khẩu giả</label>
            <input id="newDecoyCode" class="input" value="${escapeHtml(currentUser.decoyCode || '')}" placeholder="0000=" />
          </div>

          <div class="field">
            <label>Nội dung Vault giả</label>
            <input id="newDecoyContent" class="input" value="${escapeHtml(currentUser.decoyContent || '')}" placeholder="Ảnh phong cảnh, tài liệu học tập" />
          </div>

          <button class="btn" onclick="saveNewPassword()">Lưu mật khẩu</button>
          <div class="home-bar"></div>
        </div>
      `, 'dark');
    }

    function saveNewPassword() {
      const secret = document.getElementById('newSecretCode').value.trim();
      const decoy = document.getElementById('newDecoyCode').value.trim();
      const content = document.getElementById('newDecoyContent').value.trim();
      if (!secret || secret.length < 4) return toast('Mật khẩu thật cần tối thiểu 4 ký tự');
      if (!decoy || decoy.length < 4) return toast('Mật khẩu giả cần tối thiểu 4 ký tự');
      if (normalizeCode(secret) === normalizeCode(decoy)) return toast('Mật khẩu giả không được trùng mật khẩu thật');
      currentUser.secretCode = normalizeCodeForDisguise(secret, currentUser.disguise || 'Calculator');
      currentUser.decoyCode = normalizeCodeForDisguise(decoy, currentUser.disguise || 'Calculator');
      currentUser.decoyContent = content || 'Ảnh phong cảnh, tài liệu học tập';
      currentUser.setupDone = true;
      updateUser(currentUser);
      toast('Đã đổi mật khẩu');
      renderAppSettings();
    }

    function renderPayment() {
      renderPhone(`
        <div class="view vault">
          <div class="vault-top">
            <div>
              <h2>Mua thêm dung lượng</h2>
              <p>Chọn gói lưu trữ mã hóa cho Hidden Vault.</p>
            </div>
            <button class="mini-btn" onclick="renderAppSettings()">‹</button>
          </div>

          <div class="plan-grid">
            ${planCard('Basic', '500 MB', '12k/tháng', 'Phù hợp để lưu ảnh và ghi chú riêng tư cơ bản.')}
            ${planCard('Standard', '1.5 GB', '32k/tháng', 'Dung lượng vừa cho ảnh, video ngắn và tài liệu.')}
            ${planCard('Plus', '5 GB', '52k/tháng', 'Dung lượng lớn hơn cho nhiều file cá nhân.')}
          </div>

          <div class="help-box">
            <h4>Free Trial 1 tháng</h4>
            <p>Sau thời gian dùng thử, người dùng có thể chọn gói dung lượng phù hợp để tiếp tục backup mã hóa.</p>
          </div>

          <button class="btn secondary" style="margin-top:12px;" onclick="renderAppSettings()">Quay lại Settings</button>
          <div class="home-bar"></div>
        </div>
      `, 'dark');
    }

    function planCard(name, storage, price, desc) {
      const active = currentUser && currentUser.plan === name ? 'active' : '';
      return `
        <button class="plan-card ${active}" onclick="selectPlan('${name}', '${storage}', '${price}')">
          <div>
            <h4>${name} · ${storage}</h4>
            <p>${desc}</p>
          </div>
          <div class="plan-price">${price}</div>
        </button>
      `;
    }

    function selectPlan(name, storage, price) {
      currentUser.plan = name;
      currentUser.storage = storage;
      currentUser.setupDone = true;
      updateUser(currentUser);
      toast(`Đã chọn ${name} · ${storage}`);
      renderPayment();
    }

    function logoutUser() {
      localStorage.removeItem(SESSION_KEY);
      currentUser = null;
      renderHomeScreen();
      toast('Đã đăng xuất');
    }

    function handleImageUpload(input) {
      const files = Array.from(input.files || []);
      if (!files.length) return;
      const images = currentUser.uploadedImages || [];
      let remaining = files.length;

      files.forEach(file => {
        if (!file.type.startsWith('image/')) {
          remaining--;
          if (remaining === 0) finishUpload(images);
          return;
        }
        const reader = new FileReader();
        reader.onload = event => {
          images.unshift(event.target.result);
          remaining--;
          if (remaining === 0) finishUpload(images);
        };
        reader.readAsDataURL(file);
      });
    }

    function finishUpload(images) {
      currentUser.uploadedImages = images.slice(0, 18);
      currentUser.setupDone = true;
      updateUser(currentUser);
      toast('Đã thêm ảnh vào Vault');
      renderVault(false);
    }


    function showMessage(id, text, type = 'error') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text;
      el.className = `message show ${type}`;
    }

    function toast(text) {
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    function disguiseFormatNotice(disguise) {
      if (disguise === 'Calculator') {
        return 'Khi đổi sang Calculator, hệ thống sẽ tự thêm dấu = vào cuối mật khẩu để bấm = mở Vault.';
      }
      return 'Khi đổi sang ' + disguise + ', hệ thống sẽ tự bỏ dấu = ở cuối mật khẩu để thao tác nhập/search tự nhiên hơn.';
    }

    function normalizeCode(code) {
      return String(code || '').trim().replace(/=$/, '');
    }

    function normalizeCodeForDisguise(code, disguise) {
      const raw = normalizeCode(code);
      if (disguise === 'Calculator') return raw + '=';
      return raw;
    }

    function suggestCodeForDisguise(code, disguise) {
      return normalizeCodeForDisguise(code, disguise);
    }

    function setupGuideText(disguise) {
      const map = {
        Calculator: 'Calculator: nhập mật khẩu thật rồi bấm dấu = để mở Vault thật, nhập mật khẩu giả rồi bấm = để mở Vault giả.',
        Notes: 'Notes: nhập mật khẩu thật hoặc mật khẩu giả vào ô tìm kiếm rồi nhấn Enter.',
        Calendar: 'Calendar: nhập mật khẩu thật hoặc mật khẩu giả vào ô tìm kiếm lịch rồi nhấn Enter.',
        Weather: 'Weather: nhấn giữ khu vực nhiệt độ khoảng 2 giây để mở Vault.'
      };
      return map[disguise] || map.Calculator;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
